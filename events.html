<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Events</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<nav>
  <h2>Events</h2>
  <div style="display:flex;gap:12px;align-items:center;">
    <a href="index.html">Home</a>
    <button onclick="toggleDark()">🌙 Dark</button>
  </div>
</nav>

<section class="events">
  <h2>Available Events</h2>

  <!-- SEARCH + FILTER BAR -->
  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="🔍 Search events..." oninput="filterEvents()" />
    <select id="sortSelect" onchange="filterEvents()">
      <option value="default">Sort by</option>
      <option value="date">Date</option>
      <option value="seats">Seats Available</option>
    </select>
  </div>

  <div id="eventList"></div>
</section>

<!-- TICKET MODAL -->
<div id="ticketModal" class="modal-overlay" style="display:none;">
  <div class="ticket-card">
    <div class="ticket-header">
      <span>🎟️ Booking Confirmed!</span>
      <button class="close-btn" onclick="closeModal()">✕</button>
    </div>
    <div class="ticket-body">
      <div class="ticket-logo">EVENTIFY</div>
      <h2 id="ticketEventName">Event Name</h2>
      <div class="ticket-info">
        <div>
          <p class="label">Date</p>
          <p id="ticketDate" class="value">—</p>
        </div>
        <div>
          <p class="label">Seat</p>
          <p id="ticketSeat" class="value">—</p>
        </div>
        <div>
          <p class="label">Status</p>
          <p class="value" style="color:#22c55e;">Confirmed ✓</p>
        </div>
      </div>
      <div class="barcode">
        <div class="barcode-lines"></div>
        <p style="font-size:11px;color:#94a3b8;margin-top:6px;">Scan at entry</p>
      </div>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
